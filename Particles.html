<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supernova Particle System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #video-container {
            position: absolute; top: 10px; left: 10px; width: 160px; height: 120px; z-index: 10;
            border: 2px solid #ff3366; opacity: 0.6; transform: scaleX(-1);
        }
        #video-input { width: 100%; height: 100%; object-fit: cover; }
        #ui-layer {
            position: absolute; bottom: 20px; left: 20px; color: #ff3366; pointer-events: none; z-index: 10;
            text-shadow: 0 0 5px rgba(255, 50, 100, 0.5);
        }
        h1 { margin: 0; font-size: 1.4rem; }
        #status-panel { background: rgba(20, 0, 10, 0.7); padding: 15px; border-radius: 8px; border: 1px solid #ff3366; }
        .status-item { margin: 5px 0; font-size: 0.9rem; }
        .highlight { font-weight: bold; color: #fff; }
        #charge-indicator { color: orange; font-weight: bold; visibility: hidden; }
    </style>
</head>
<body>

    <div id="video-container"><video id="video-input"></video></div>

    <div id="ui-layer">
        <h1>SUPERNOVA ENGINE</h1>
        <div id="status-panel">
            <p class="status-item">SHAPE: <span id="shape-name" class="highlight">SPHERE</span></p>
            <p class="status-item">PALETTE: <span id="palette-name" class="highlight">Neon Fire</span></p>
            <p id="charge-indicator">⚠️ ENERGY CHARGED! RELEASE FIST!</p>
            <br>
            <p style="font-size: 0.8rem; color:white;">GESTURES:</p>
            <p class="status-item">👌 PINCH: Cycle Shapes Next</p>
            <p class="status-item">✊ HOLD FIST: Charge Energy</p>
            <p class="status-item">🖐 RELEASE FIST: SUPERNOVA!</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
        // --- CONFIGURATION ---
        const PARTICLE_COUNT = 20000;
        const PARTICLE_SIZE = 0.06;
        const MORPH_SPEED = 0.04;
        const EXPLOSION_FORCE = 0.5;
        const EXPLOSION_DRAG = 0.92; // Lower = faster slowdown

        let scene, camera, renderer, particleSystem;
        let positions, targetPositions, colors, velocities, baseColors;
        let clock = new THREE.Clock();

        // --- STATE MANAGEMENT ---
        const SHAPE_NAMES = ["SPHERE", "HEART", "SATURN", "FLOWER", "NEUTRON STAR"];
        let currentShapeIndex = 0;
        
        // Color Palettes
        const PALETTES = [
            { name: "Neon Fire", hueRange: [0.0, 0.1], sat: 1.0, light: 0.6 },
            { name: "Deep Space Ice", hueRange: [0.5, 0.65], sat: 0.9, light: 0.7 },
            { name: "Toxic Nebula", hueRange: [0.25, 0.35], sat: 1.0, light: 0.6 },
            { name: "Golden Era", hueRange: [0.12, 0.18], sat: 0.8, light: 0.5 },
            { name: "Cyberpunk", hueRange: [0.7, 0.9], sat: 1.0, light: 0.6 }
        ];
        let currentPaletteIndex = 0;

        // Interaction State
        let handPosition = { x: 0, y: 0, z: 0 };
        let targetScale = 1;
        let isPinching = false, lastPinchTime = 0;
        let isFistHeld = false, fistHoldStartTime = 0;
        let isCharged = false;
        
        // Physics State
        let isExploding = false;
        let explosionTime = 0;

        // --- INITIALIZATION ---
        initThreeJS();
        initMediaPipe();
        animate();

        function initThreeJS() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.03);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
            document.body.appendChild(renderer.domElement);

            // Geometry Setup
            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(PARTICLE_COUNT * 3);
            targetPositions = new Float32Array(PARTICLE_COUNT * 3);
            colors = new Float32Array(PARTICLE_COUNT * 3);
            baseColors = new Float32Array(PARTICLE_COUNT * 3); // Store base HSL hue for each particle
            velocities = new Float32Array(PARTICLE_COUNT * 3); // For physics

            // Initial State
            calculateShape(0, targetPositions);
            assignPaletteColors(0);
            for(let i=0; i<targetPositions.length; i++) positions[i] = targetPositions[i];

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: PARTICLE_SIZE,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.9
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            window.addEventListener('resize', onWindowResize);
        }

        // --- SHAPE MATHEMATICS ---
        function calculateShape(index, arr) {
            switch(index) {
                case 0: // Sphere
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        const r = 2.5;
                        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                        arr[i*3] = r * Math.cos(theta) * Math.sin(phi);
                        arr[i*3+1] = r * Math.sin(theta) * Math.sin(phi);
                        arr[i*3+2] = r * Math.cos(phi);
                    }
                    break;
                case 1: // Heart
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        const t = Math.random() * Math.PI * 2;
                        const phi = Math.random() * Math.PI;
                        const scale = 0.15;
                        const r = 16 * Math.pow(Math.sin(t), 3);
                        const hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                        arr[i*3] = r * scale * Math.cos(phi);
                        arr[i*3+1] = (hy * scale) + 0.5;
                        arr[i*3+2] = r * scale * Math.sin(phi) + (Math.random()-0.5);
                    }
                    break;
                case 2: // Saturn
                     for (let i = 0; i < PARTICLE_COUNT; i++) {
                        if(i > PARTICLE_COUNT * 0.65) { // Rings
                            const r = 2.5 + Math.random() * 1.8;
                            const theta = Math.random() * Math.PI * 2;
                            const x = r * Math.cos(theta); const y = (Math.random()-0.5)*0.1; const z = r * Math.sin(theta);
                            const angle = 0.4;
                            arr[i*3] = x * Math.cos(angle) - y * Math.sin(angle);
                            arr[i*3+1] = x * Math.sin(angle) + y * Math.cos(angle);
                            arr[i*3+2] = z;
                        } else { // Planet
                            const r = 1.5; const theta = Math.random()*Math.PI*2; const phi = Math.acos((Math.random()*2)-1);
                            arr[i*3] = r * Math.sin(phi) * Math.cos(theta);
                            arr[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                            arr[i*3+2] = r * Math.cos(phi);
                        }
                    }
                    break;
                case 3: // Flower
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        const k = 5; const theta = Math.random() * Math.PI * 2;
                        const r = 2 + Math.cos(k * theta); const phi = (Math.random() - 0.5) * Math.PI * 0.8;
                        arr[i*3] = r * Math.cos(theta) * Math.cos(phi);
                        arr[i*3+1] = r * Math.sin(theta) * Math.cos(phi);
                        arr[i*3+2] = r * Math.sin(phi) * 1.5;
                    }
                    break;
                 case 4: // Neutron Star (Dense, noisy sphere)
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        const rBase = 0.8; // Small radius
                        // Add extreme noise to pack them tightly but chaotically
                        const r = rBase + (Math.random() - 0.5) * 0.4; 
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos((Math.random() * 2) - 1);
                        arr[i*3] = r * Math.sin(phi) * Math.cos(theta);
                        arr[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                        arr[i*3+2] = r * Math.cos(phi);
                    }
                    break;
            }
        }

        // --- COLOR & PHYSICS ---
        function assignPaletteColors(paletteIdx) {
            currentPaletteIndex = paletteIdx;
            const p = PALETTES[currentPaletteIndex];
            const hueSpan = p.hueRange[1] - p.hueRange[0];
            
            for(let i=0; i < PARTICLE_COUNT; i++) {
                // Assign a base hue within the palette range per particle
                baseColors[i] = p.hueRange[0] + Math.random() * hueSpan;
            }
            updateUI();
        }

        function triggerSupernova() {
            isExploding = true;
            explosionTime = clock.getElapsedTime();
            
            // 1. Set chaotic outward velocities
            for(let i=0; i < PARTICLE_COUNT; i++) {
                const px = i*3, py = i*3+1, pz = i*3+2;
                // Vector from center
                let vx = positions[px]; let vy = positions[py]; let vz = positions[pz];
                // Normalize
                const mag = Math.sqrt(vx*vx + vy*vy + vz*vz) || 1;
                vx /= mag; vy /= mag; vz /= mag;

                // Add randomness to speed
                const speed = EXPLOSION_FORCE * (0.5 + Math.random() * 1.5);
                velocities[px] = vx * speed;
                velocities[py] = vy * speed;
                velocities[pz] = vz * speed;
            }

            // 2. Pick Random New Shape & Palette for when it reforms
            currentShapeIndex = Math.floor(Math.random() * SHAPE_NAMES.length);
            const newPaletteIdx = Math.floor(Math.random() * PALETTES.length);
            
            calculateShape(currentShapeIndex, targetPositions);
            assignPaletteColors(newPaletteIdx);
        }

        // --- MEDIAPIPE & GESTURES ---
        function initMediaPipe() {
            const videoElement = document.getElementById('video-input');
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
            hands.onResults(onHandsResults);
            const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 });
            camera.start();
        }

        function onHandsResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                updateHandTracking(lm);
                detectPinch(lm);
                detectFist(lm);
            } else {
                resetHandInteractions();
            }
        }

        function updateHandTracking(lm) {
            // Position (Index tip)
            handPosition.x += ((lm[8].x - 0.5) * 2 * 4 - handPosition.x) * 0.1;
            handPosition.y += (-(lm[8].y - 0.5) * 2 * 4 - handPosition.y) * 0.1;
            // Scale (using depth Z)
            let scaleRaw = 1 + Math.abs(lm[8].z) * 5;
            targetScale = Math.max(0.5, Math.min(3.5, scaleRaw));
        }

        function detectPinch(lm) {
            const dist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
            if (dist < 0.05) {
                if (!isPinching && Date.now() - lastPinchTime > 500 && !isExploding) {
                    currentShapeIndex = (currentShapeIndex + 1) % SHAPE_NAMES.length;
                    calculateShape(currentShapeIndex, targetPositions);
                    updateUI();
                    lastPinchTime = Date.now();
                    isPinching = true;
                }
            } else { isPinching = false; }
        }

        function detectFist(lm) {
            // Check distances of fingertips (8,12,16,20) to palm center (9)
            const tips = [8, 12, 16, 20];
            let avgDistToPalm = 0;
            tips.forEach(tipIdx => {
                 avgDistToPalm += Math.hypot(lm[tipIdx].x - lm[9].x, lm[tipIdx].y - lm[9].y);
            });
            avgDistToPalm /= tips.length;

            const FIST_THRESHOLD = 0.12; 

            if (avgDistToPalm < FIST_THRESHOLD) {
                if (!isFistHeld) { fistHoldStartTime = Date.now(); isFistHeld = true; }
                if (Date.now() - fistHoldStartTime > 800 && !isExploding && !isCharged) {
                    isCharged = true;
                    document.getElementById('charge-indicator').style.visibility = 'visible';
                }
            } else {
                // Fist Released
                if (isFistHeld && isCharged && !isExploding) {
                    triggerSupernova();
                }
                isFistHeld = false;
                isCharged = false;
                document.getElementById('charge-indicator').style.visibility = 'hidden';
            }
        }

        function resetHandInteractions() {
            handPosition.x *= 0.95; handPosition.y *= 0.95;
            targetScale += (1 - targetScale) * 0.05;
            isFistHeld = false; isCharged = false;
            document.getElementById('charge-indicator').style.visibility = 'hidden';
        }

        function updateUI() {
            document.getElementById('shape-name').innerText = SHAPE_NAMES[currentShapeIndex];
            document.getElementById('palette-name').innerText = PALETTES[currentPaletteIndex].name;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- MAIN ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const posAttr = particleSystem.geometry.attributes.position;
            const colAttr = particleSystem.geometry.attributes.color;
            const p = PALETTES[currentPaletteIndex];

            let totalSpeed = 0;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const px = i*3, py = i*3+1, pz = i*3+2;

                if (isExploding) {
                    // PHYSICS MODE
                    positions[px] += velocities[px];
                    positions[py] += velocities[py];
                    positions[pz] += velocities[pz];

                    // Apply Drag
                    velocities[px] *= EXPLOSION_DRAG;
                    velocities[py] *= EXPLOSION_DRAG;
                    velocities[pz] *= EXPLOSION_DRAG;

                    totalSpeed += Math.abs(velocities[px]) + Math.abs(velocities[py]) + Math.abs(velocities[pz]);

                } else {
                    // MORPHING MODE (Lerp to target)
                    positions[px] += (targetPositions[px] - positions[px]) * MORPH_SPEED;
                    positions[py] += (targetPositions[py] - positions[py]) * MORPH_SPEED;
                    positions[pz] += (targetPositions[pz] - positions[pz]) * MORPH_SPEED;
                    
                    // Add slight jitter for life
                    const jitter = (currentShapeIndex === 4) ? 0.02 : 0.005; // More jitter for neutron star
                    positions[px] += (Math.random()-0.5)*jitter;
                    positions[py] += (Math.random()-0.5)*jitter;
                    positions[pz] += (Math.random()-0.5)*jitter;
                }

                // COLOR DYNAMICS
                const color = new THREE.Color();
                // Shimmer effect based on time and position
                let hue = baseColors[i] + (time * 0.05); 
                // During explosion, boost saturation and brightness
                let sat = isExploding ? 1.0 : p.sat;
                let light = isExploding ? 0.8 : p.light + Math.sin(time*2 + positions[px])*0.1;
                
                color.setHSL(hue % 1, sat, light);
                colors[px] = color.r; colors[py] = color.g; colors[pz] = color.b;
            }

            // Check if explosion is effectively over
            if (isExploding && totalSpeed < PARTICLE_COUNT * 0.01 && (time - explosionTime > 1.0)) {
                 isExploding = false;
            }

            // Global Transformations based on hand
            particleSystem.rotation.y += 0.002 + (handPosition.x * 0.01);
            particleSystem.rotation.x += (handPosition.y * 0.01);
            particleSystem.scale.setScalar(THREE.MathUtils.lerp(particleSystem.scale.x, targetScale, 0.1));

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
